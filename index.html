<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X STORE | The Future of Streetwear</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-black: #050505;
            --primary-red: #D90429;
            --neon-red: rgba(217, 4, 41, 0.6);
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #FFFFFF;
            --text-muted: #8D99AE;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            background-color: var(--bg-black);
            color: var(--text-main);
            font-family: 'Rajdhani', sans-serif;
            overflow-x: hidden;
            width: 100%;
            min-height: 100vh;
        }

        /* --- تأثير الإضاءة الخلفية (بديل النجوم لاستهلاك أقل للبطارية) --- */
        .ambient-glow {
            position: fixed;
            width: 60vw; height: 60vw;
            background: radial-gradient(circle, var(--neon-red) 0%, transparent 60%);
            top: -20%; left: -20%;
            z-index: -1;
            filter: blur(90px);
            opacity: 0.4;
            animation: pulseGlow 10s infinite alternate ease-in-out;
            pointer-events: none;
        }
        .ambient-glow.right {
            top: auto; bottom: -20%; left: auto; right: -20%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 60%);
            animation-duration: 15s;
        }

        @keyframes pulseGlow {
            0% { transform: scale(1) translate(0, 0); opacity: 0.3; }
            100% { transform: scale(1.2) translate(50px, 50px); opacity: 0.6; }
        }

        /* --- نظام الصفحات (SPA) --- */
        .view {
            display: none;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            width: 100%;
            min-height: 100vh;
            animation: fadeIn 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            z-index: 10;
        }
        .view.active { display: flex; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- الخطوط والنصوص --- */
        h1, h2, .brand-font { font-family: 'Syncopate', sans-serif; text-transform: uppercase; }
        
        .brand-logo {
            font-size: 4rem;
            font-weight: 700;
            letter-spacing: 5px;
            color: transparent;
            -webkit-text-stroke: 2px var(--text-main);
            text-shadow: 0 0 20px var(--neon-red);
            margin-bottom: 20px;
        }

        /* --- الأزرار والتنقل --- */
        .nav-menu { display: flex; flex-direction: column; gap: 20px; text-align: center; margin-top: 5vh; }
        .nav-item {
            font-family: 'Syncopate', sans-serif;
            font-size: 1.2rem;
            letter-spacing: 5px;
            color: var(--text-muted);
            cursor: pointer;
            transition: 0.3s;
            position: relative;
        }
        .nav-item:hover { color: var(--text-main); text-shadow: 0 0 10px white; }
        
        .btn-glass {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);
            color: var(--text-main);
            padding: 15px 30px;
            font-family: 'Syncopate', sans-serif;
            font-size: 0.9rem;
            letter-spacing: 2px;
            cursor: pointer;
            transition: 0.3s;
            border-radius: 5px;
        }
        .btn-glass:hover {
            background: var(--primary-red);
            border-color: var(--primary-red);
            box-shadow: 0 0 20px var(--neon-red);
            transform: translateY(-2px);
        }

        .btn-back {
            align-self: flex-start;
            background: none; border: none; color: var(--text-muted);
            font-family: 'Rajdhani', sans-serif; font-size: 1.2rem;
            cursor: pointer; display: flex; align-items: center; gap: 10px;
            margin-bottom: 30px; transition: 0.3s;
        }
        .btn-back:hover { color: var(--text-main); transform: translateX(-5px); }

        /* --- شبكة المنتجات --- */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            width: 100%;
            max-width: 1200px;
        }

        .card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            padding: 25px;
            backdrop-filter: blur(15px);
            transition: 0.4s;
            cursor: pointer;
            text-align: center;
        }
        .card:hover {
            border-color: rgba(217, 4, 41, 0.4);
            transform: translateY(-10px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.5), 0 0 20px rgba(217, 4, 41, 0.1);
        }
        
        .card img {
            width: 100%; aspect-ratio: 1/1; object-fit: contain;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.5));
            transition: 0.4s;
        }
        .card:hover img { transform: scale(1.08); filter: drop-shadow(0 10px 20px var(--neon-red)); }

        .card-title { font-size: 1.2rem; font-weight: 700; margin-top: 20px; letter-spacing: 1px; }
        .card-price { color: var(--primary-red); font-weight: 600; font-size: 1.1rem; margin-top: 5px; }

        /* --- تفاصيل المنتج --- */
        .product-layout {
            display: flex; flex-wrap: wrap; gap: 50px;
            max-width: 1100px; width: 100%; align-items: center; justify-content: center;
        }
        .product-img-wrapper { flex: 1; min-width: 300px; max-width: 500px; }
        .product-img-wrapper img {
            width: 100%; filter: drop-shadow(0 0 30px rgba(217, 4, 41, 0.3));
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .product-info {
            flex: 1; min-width: 300px;
            background: rgba(10, 10, 10, 0.6);
            border: 1px solid var(--glass-border);
            padding: 40px; border-radius: 20px;
            backdrop-filter: blur(20px);
        }

        .product-info h1 { font-size: 2rem; letter-spacing: 2px; margin-bottom: 10px; }
        .price-badge {
            display: inline-block; background: var(--primary-red); color: white;
            padding: 5px 15px; font-weight: 700; font-size: 1.2rem; border-radius: 3px;
            margin-bottom: 20px;
        }

        .selectors { margin: 25px 0; }
        .selectors label { display: block; color: var(--text-muted); font-size: 0.9rem; margin-bottom: 10px; }
        
        .size-grid { display: flex; gap: 10px; }
        .size-box {
            width: 45px; height: 45px; display: flex; align-items: center; justify-content: center;
            border: 1px solid var(--glass-border); cursor: pointer; transition: 0.3s;
            font-weight: 600; color: var(--text-muted); border-radius: 5px;
        }
        .size-box.active, .size-box:hover {
            background: var(--text-main); color: var(--bg-black); border-color: var(--text-main);
            box-shadow: 0 0 15px rgba(255,255,255,0.3);
        }

    </style>
</head>
<body>

    <div class="ambient-glow"></div>
    <div class="ambient-glow right"></div>

    <main id="view-home" class="view active" style="justify-content: center; text-align: center;">
        <div class="brand-logo">X</div>
        <h2 class="brand-font" style="font-size: 1rem; letter-spacing: 8px; color: var(--text-muted);">Official Experience</h2>
        
        <nav class="nav-menu">
            <div class="nav-item" onclick="navigate('view-catalog')">ENTER STORE</div>
            <div class="nav-item">COLLECTIONS</div>
            <div class="nav-item">SUPPORT</div>
        </nav>
    </main>

    <main id="view-catalog" class="view">
        <button class="btn-back" onclick="history.back()">&#8592; BACK</button>
        <h2 class="brand-font" style="margin-bottom: 40px; font-size: 2rem;">NEW ARRIVALS</h2>
        <div class="grid" id="catalog-grid">
            </div>
    </main>

    <main id="view-product" class="view">
        <button class="btn-back" onclick="history.back()">&#8592; BACK TO SHOP</button>
        <div class="product-layout" id="product-content">
            </div>
    </main>

    <script>
        // --- 1. قاعدة بيانات المنتجات ---
        const products = [
            { id: 1, name: "X-CORE HOODIE", price: "1200", desc: "Premium heavyweight cotton. Oversized fit with glowing reflective 'X' logo on the back.", img: "https://placehold.co/600x600/111/fff?text=X-CORE+HOODIE" },
            { id: 2, name: "CYBER JACKET", price: "2500", desc: "Water-resistant techwear jacket with multi-pocket utility design.", img: "https://placehold.co/600x600/111/fff?text=CYBER+JACKET" },
            { id: 3, name: "NEON RED TEE", price: "600", desc: "Breathable fabric engineered for the future. Minimalist aesthetic.", img: "https://placehold.co/600x600/111/fff?text=NEON+TEE" },
            { id: 4, name: "STEALTH PANTS", price: "1400", desc: "Tactical cargo pants with magnetic buckles and adjustable straps.", img: "https://placehold.co/600x600/111/fff?text=STEALTH+PANTS" }
        ];

        const WHATSAPP_NUM = "201000000000";

        // --- 2. نظام التنقل والتاريخ (History API) ---
        window.onload = () => {
            // تسجيل الصفحة الرئيسية في التاريخ عند فتح الموقع
            if(!history.state) {
                history.replaceState({ view: 'view-home' }, "", "#home");
            }
            renderCatalog();
        };

        window.onpopstate = (event) => {
            // الاستجابة لزر الرجوع في المتصفح أو الهاتف
            if (event.state && event.state.view) {
                showView(event.state.view, event.state.data);
            } else {
                showView('view-home');
            }
        };

        function navigate(viewId, data = null) {
            // دفع حالة جديدة لتاريخ المتصفح
            history.pushState({ view: viewId, data: data }, "", "#" + viewId.replace('view-', ''));
            showView(viewId, data);
        }

        function showView(viewId, data = null) {
            // إخفاء جميع الشاشات
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            // إظهار الشاشة المطلوبة
            document.getElementById(viewId).classList.add('active');
            window.scrollTo({ top: 0, behavior: 'smooth' });

            // إذا كانت الشاشة هي شاشة المنتج، قم بتحديث بياناتها
            if (viewId === 'view-product' && data) {
                renderProductDetails(data);
            }
        }

        // --- 3. بناء واجهة المنتجات ---
        function renderCatalog() {
            const grid = document.getElementById('catalog-grid');
            grid.innerHTML = '';
            
            products.forEach(p => {
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => navigate('view-product', p); // إرسال بيانات المنتج عند الضغط
                
                card.innerHTML = `
                    <img src="${p.img}" alt="${p.name}">
                    <div class="card-title">${p.name}</div>
                    <div class="card-price">LE ${p.price}</div>
                `;
                grid.appendChild(card);
            });
        }

        // --- 4. بناء واجهة تفاصيل المنتج ---
        function renderProductDetails(product) {
            const content = document.getElementById('product-content');
            content.innerHTML = `
                <div class="product-img-wrapper">
                    <img src="${product.img}" alt="${product.name}">
                </div>
                <div class="product-info">
                    <h1>${product.name}</h1>
                    <div class="price-badge">LE ${product.price}</div>
                    <p style="color: var(--text-muted); line-height: 1.6; font-size: 1.1rem; margin-bottom: 20px;">
                        ${product.desc}
                    </p>
                    
                    <div class="selectors">
                        <label>SELECT SIZE</label>
                        <div class="size-grid">
                            <div class="size-box" onclick="selectSize(this)">S</div>
                            <div class="size-box active" onclick="selectSize(this)">M</div>
                            <div class="size-box" onclick="selectSize(this)">L</div>
                            <div class="size-box" onclick="selectSize(this)">XL</div>
                        </div>
                    </div>

                    <div style="margin-top: 40px; display: flex; gap: 15px; flex-wrap: wrap;">
                        <button class="btn-glass" style="flex: 1; background: var(--text-main); color: var(--bg-black); font-weight: bold;" 
                                onclick="checkout('${product.name}', '${product.price}')">
                            BUY NOW (WHATSAPP)
                        </button>
                    </div>
                </div>
            `;
        }

        // --- 5. وظائف مساعدة (اختيار المقاس وإتمام الطلب) ---
        window.selectSize = function(element) {
            document.querySelectorAll('.size-box').forEach(b => b.classList.remove('active'));
            element.classList.add('active');
        }

        window.checkout = function(name, price) {
            const sizeBox = document.querySelector('.size-box.active');
            const size = sizeBox ? sizeBox.innerText : 'Not Selected';
            
            const message = `🚨 *NEW ORDER - X STORE* 🚨%0A%0A📦 *Item:* ${name}%0A💰 *Price:* LE ${price}%0A📏 *Size:* ${size}%0A%0APlease confirm my order!`;
            window.open(`https://wa.me/${WHATSAPP_NUM}?text=${message}`, '_blank');
        }
    </script>
</body>
</html>
