<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOID | Underground Luxury</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Space+Grotesk:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #000000;
            --text-color: #ffffff;
            --glow-color: rgba(255, 255, 255, 0.8);
            --neon-accent: #f0f0f0;
            --font-main: 'Orbitron', sans-serif;
            --font-sub: 'Space Grotesk', sans-serif;
            --transition-speed: 0.5s;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-main);
            overflow-x: hidden;
            overflow-y: hidden; /* Handled dynamically */
            -webkit-font-smoothing: antialiased;
        }

        /* Noise Overlay */
        .noise-overlay {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none;
            z-index: 9999;
            opacity: 0.04;
            background: url('data:image/svg+xml,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)"/%3E%3C/svg%3E');
        }

        /* Loading Screen */
        #loading-screen {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            transition: opacity 1s ease-out;
        }
        
        .loader-logo {
            font-size: 2rem;
            letter-spacing: 10px;
            animation: pulseGlow 2s infinite alternate;
        }

        /* Starfield Canvas */
        #starfield {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* View Management */
        .view {
            position: absolute;
            top: 0; left: 0; width: 100vw; min-height: 100vh;
            opacity: 0;
            visibility: hidden;
            transition: opacity var(--transition-speed) ease, filter var(--transition-speed) ease;
            z-index: 10;
            padding-bottom: 50px;
        }
        .view.active {
            opacity: 1;
            visibility: visible;
            filter: blur(0px);
        }
        .view.transitioning {
            filter: blur(10px);
            opacity: 0;
        }

        /* --- LANDING PAGE --- */
        #landing-view {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 5vh 0;
        }

        .landing-header {
            text-align: center;
            z-index: 20;
        }

        .brand-logo {
            font-size: 3rem;
            font-weight: 900;
            letter-spacing: 15px;
            text-shadow: 0 0 20px var(--glow-color);
            margin-bottom: 10px;
        }

        .digital-clock {
            font-family: var(--font-sub);
            font-size: 1rem;
            letter-spacing: 3px;
            opacity: 0.7;
        }

        .landing-menu {
            display: flex;
            flex-direction: column;
            gap: 40px;
            text-align: center;
            z-index: 20;
        }

        .menu-item {
            font-size: 1.5rem;
            letter-spacing: 8px;
            cursor: pointer;
            position: relative;
            transition: transform 0.3s ease;
        }

        .menu-item:hover {
            transform: scale(1.1);
            animation: glitchText 0.3s infinite;
            text-shadow: 0 0 15px #fff, 0 0 30px #fff;
        }

        .landing-socials {
            display: flex;
            gap: 30px;
            z-index: 20;
        }

        .social-icon {
            font-family: var(--font-sub);
            font-size: 0.9rem;
            letter-spacing: 2px;
            cursor: pointer;
            transition: text-shadow 0.3s ease;
        }
        .social-icon:hover {
            text-shadow: 0 0 10px #fff;
        }

        /* --- PRODUCTS PAGE --- */
        #dynamic-bg {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-size: cover;
            background-position: center;
            filter: blur(20px) brightness(0.2);
            z-index: 1;
            opacity: 0;
            transition: opacity 1s ease;
            pointer-events: none;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            position: sticky;
            top: 0;
            z-index: 50;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
        }

        .top-bar-icon { cursor: pointer; font-size: 1.2rem; }
        .top-bar-logo { font-size: 1.5rem; letter-spacing: 8px; font-weight: 700; cursor: pointer; text-shadow: 0 0 10px var(--glow-color); }
        .cart-container { position: relative; cursor: pointer;}
        #cart-count {
            position: absolute; top: -10px; right: -15px;
            font-size: 0.7rem; background: #fff; color: #000;
            border-radius: 50%; padding: 2px 6px; font-weight: bold;
        }

        .category-selector {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin: 40px 0;
            font-family: var(--font-sub);
            letter-spacing: 4px;
            font-size: 0.9rem;
            z-index: 20;
            position: relative;
        }
        .category-selector span { cursor: pointer; opacity: 0.5; transition: opacity 0.3s; }
        .category-selector span.active { opacity: 1; border-bottom: 1px solid #fff; }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 40px;
            padding: 0 5vw;
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 20;
        }

        .product-card {
            background: rgba(10, 10, 10, 0.6);
            border: 1px solid rgba(255,255,255,0.05);
            padding: 20px;
            cursor: pointer;
            transition: all 0.4s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .product-card:hover {
            transform: scale(1.05) translateY(-10px);
            border-color: rgba(255,255,255,0.2);
            box-shadow: 0 0 30px rgba(255,255,255,0.1);
        }

        .product-img-wrapper {
            width: 100%;
            height: 350px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        .product-img-wrapper::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 60%; height: 60%;
            background: rgba(255,255,255,0.1);
            filter: blur(40px);
            z-index: -1;
            transition: all 0.4s ease;
        }
        .product-card:hover .product-img-wrapper::after {
            background: rgba(255,255,255,0.3);
            filter: blur(50px);
        }
        .product-image {
            max-width: 100%;
            max-height: 100%;
            object-fit: cover;
            filter: drop-shadow(0 0 10px rgba(0,0,0,0.8));
        }

        .product-info {
            text-align: center;
            margin-top: 20px;
        }
        .product-name {
            font-size: 1.1rem;
            letter-spacing: 3px;
            margin-bottom: 8px;
        }
        .product-price {
            font-family: var(--font-sub);
            color: #aaa;
            letter-spacing: 1px;
        }

        /* --- PRODUCT DETAILS PAGE --- */
        #details-view {
            padding-top: 10vh;
            position: relative;
            z-index: 20;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .details-container {
            max-width: 800px;
            text-align: center;
            animation: fadeUp 0.8s ease forwards;
        }

        .details-img-wrapper {
            width: 400px;
            height: 500px;
            margin: 0 auto;
            position: relative;
        }
        .details-img-wrapper::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 80%; height: 80%;
            background: rgba(255,255,255,0.15);
            filter: blur(60px);
            z-index: -1;
        }
        .details-image {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .details-info {
            margin-top: 40px;
        }
        .details-name {
            font-size: 2.5rem;
            letter-spacing: 8px;
            text-shadow: 0 0 15px rgba(255,255,255,0.5);
            margin-bottom: 10px;
        }
        .details-price {
            font-size: 1.5rem;
            font-family: var(--font-sub);
            margin-bottom: 5px;
        }
        .details-shipping {
            font-size: 0.8rem;
            color: #666;
            font-family: var(--font-sub);
            margin-bottom: 30px;
        }

        .qty-selector {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            font-family: var(--font-sub);
            margin-bottom: 30px;
        }
        .qty-btn { cursor: pointer; font-size: 1.5rem; padding: 0 10px; }
        
        .add-to-cart-btn {
            background: transparent;
            color: #fff;
            border: 1px solid #fff;
            padding: 15px 50px;
            font-family: var(--font-main);
            font-size: 1rem;
            letter-spacing: 4px;
            cursor: pointer;
            border-radius: 30px;
            box-shadow: 0 0 10px rgba(255,255,255,0.2), inset 0 0 10px rgba(255,255,255,0.1);
            transition: all 0.3s ease;
        }
        .add-to-cart-btn:hover {
            box-shadow: 0 0 20px rgba(255,255,255,0.8), inset 0 0 15px rgba(255,255,255,0.4);
            transform: scale(1.05);
            background: rgba(255,255,255,0.1);
        }

        .details-nav {
            margin-top: 50px;
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 400px;
            font-family: var(--font-sub);
            letter-spacing: 2px;
            color: #888;
        }
        .details-nav span { cursor: pointer; transition: color 0.3s; }
        .details-nav span:hover { color: #fff; text-shadow: 0 0 5px #fff; }

        /* Animations */
        @keyframes pulseGlow {
            0% { text-shadow: 0 0 10px #fff; }
            100% { text-shadow: 0 0 30px #fff, 0 0 40px #fff; }
        }

        @keyframes glitchText {
            0% { transform: translate(0) }
            20% { transform: translate(-2px, 2px) }
            40% { transform: translate(-2px, -2px) }
            60% { transform: translate(2px, 2px) }
            80% { transform: translate(2px, -2px) }
            100% { transform: translate(0) }
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            .product-grid { grid-template-columns: repeat(2, 1fr); gap: 15px; }
            .product-img-wrapper { height: 200px; }
            .brand-logo { font-size: 2rem; letter-spacing: 10px; }
            .menu-item { font-size: 1.2rem; }
            .details-img-wrapper { width: 100%; height: 350px; }
            .details-name { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <div class="noise-overlay"></div>
    
    <!-- Loading Screen -->
    <div id="loading-screen">
        <div class="loader-logo">VOID</div>
    </div>

    <!-- Starfield Background -->
    <canvas id="starfield"></canvas>

    <!-- Dynamic Background for Products/Details -->
    <div id="dynamic-bg"></div>

    <div id="app">
        <!-- Landing View -->
        <div id="landing-view" class="view">
            <div class="landing-header">
                <div class="brand-logo">VOID</div>
                <div class="digital-clock" id="clock">00:00:00</div>
            </div>
            
            <div class="landing-menu">
                <div class="menu-item" onclick="navigate('landing')">HOME</div>
                <div class="menu-item" onclick="navigate('products')">SHOP ALL</div>
                <div class="menu-item" onclick="alert('Contact Module Initiated.')">CONTACT</div>
            </div>

            <div class="landing-socials">
                <span class="social-icon">IG</span>
                <span class="social-icon">TK</span>
                <span class="social-icon">YT</span>
            </div>
        </div>

        <!-- Products View -->
        <div id="products-view" class="view">
            <div class="top-bar">
                <span class="top-bar-icon">☰</span>
                <span class="top-bar-logo" onclick="navigate('landing')">VOID</span>
                <div style="display:flex; gap: 20px;">
                    <span class="top-bar-icon">⚲</span>
                    <div class="cart-container" onclick="alert('Cart Module. Total items: ' + cart.length)">
                        <span class="top-bar-icon">🛒</span>
                        <span id="cart-count">0</span>
                    </div>
                </div>
            </div>

            <div class="category-selector">
                <span>JACKET</span>
                <span class="active">SHOP ALL</span>
                <span>TRACKSUIT</span>
            </div>

            <div class="product-grid" id="product-grid">
                <!-- Products injected via JS -->
            </div>
        </div>

        <!-- Product Details View -->
        <div id="details-view" class="view">
            <div class="top-bar">
                <span class="top-bar-icon" onclick="navigate('products')">←</span>
                <span class="top-bar-logo" onclick="navigate('landing')">VOID</span>
                <div style="display:flex; gap: 20px;">
                    <div class="cart-container" onclick="alert('Cart Module. Total items: ' + cart.length)">
                        <span class="top-bar-icon">🛒</span>
                        <span id="details-cart-count">0</span>
                    </div>
                </div>
            </div>

            <div class="details-container" id="details-container">
                <!-- Content injected via JS -->
            </div>
        </div>
    </div>

    <script>
        // Configuration
        const productsBackground = "https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=2000&auto=format&fit=crop"; 
        
        // Dummy Product Data
        const productsData = [
            { id: 1, name: "OBSIDIAN PUFFER", price: 4500, img: "https://images.unsplash.com/photo-1551028719-01c1eb54fcd4?auto=format&fit=crop&w=600&q=80" },
            { id: 2, name: "NEO TRACKSUIT", price: 3200, img: "https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?auto=format&fit=crop&w=600&q=80" },
            { id: 3, name: "VOID CARGO", price: 2800, img: "https://images.unsplash.com/photo-1622445275463-afa2ab738c34?auto=format&fit=crop&w=600&q=80" },
            { id: 4, name: "ABYSS HOODIE", price: 2100, img: "https://images.unsplash.com/photo-1556821840-3a63f95609a7?auto=format&fit=crop&w=600&q=80" }
        ];

        let currentProductIdx = 0;
        let selectedQty = 1;
        let cart = JSON.parse(localStorage.getItem('void_cart')) || [];

        // App Initialization
        window.onload = () => {
            initClock();
            initStarfield();
            updateCartUI();
            
            setTimeout(() => {
                document.getElementById('loading-screen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('loading-screen').style.display = 'none';
                    navigate('landing');
                }, 1000);
            }, 1500);
            
            document.getElementById('dynamic-bg').style.backgroundImage = `url('${productsBackground}')`;
        };

        // Navigation Logic
        function navigate(viewName) {
            const views = document.querySelectorAll('.view');
            views.forEach(v => {
                if(v.classList.contains('active')) {
                    v.classList.remove('active');
                    v.classList.add('transitioning');
                    setTimeout(() => v.classList.remove('transitioning'), 500);
                }
            });

            setTimeout(() => {
                const target = document.getElementById(`${viewName}-view`);
                target.classList.add('active');
                
                // Handle dynamic background visibility
                const dynamicBg = document.getElementById('dynamic-bg');
                if(viewName === 'landing') {
                    dynamicBg.style.opacity = '0';
                    document.body.style.overflowY = 'hidden';
                } else {
                    dynamicBg.style.opacity = '0.5';
                    document.body.style.overflowY = 'auto';
                }

                if(viewName === 'products') renderProducts();
                window.scrollTo(0,0);
            }, 300); // Wait for fade out
        }

        // Render Products Grid
        function renderProducts() {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = '';
            
            productsData.forEach((prod, index) => {
                const card = document.createElement('div');
                card.className = 'product-card';
                card.onclick = () => openDetails(index);
                card.innerHTML = `
                    <div class="product-img-wrapper">
                        <img src="${prod.img}" class="product-image" loading="lazy" alt="${prod.name}">
                    </div>
                    <div class="product-info">
                        <div class="product-name">${prod.name}</div>
                        <div class="product-price">${prod.price} EGP</div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // Open Product Details
        function openDetails(index) {
            currentProductIdx = index;
            selectedQty = 1;
            renderDetails();
            navigate('details');
        }

        // Render Details Page
        function renderDetails() {
            const prod = productsData[currentProductIdx];
            const container = document.getElementById('details-container');
            
            container.innerHTML = `
                <div class="details-img-wrapper">
                    <img src="${prod.img}" class="details-image" alt="${prod.name}">
                </div>
                <div class="details-info">
                    <div class="details-name">${prod.name}</div>
                    <div class="details-price">${prod.price} EGP</div>
                    <div class="details-shipping">Shipping calculated at checkout</div>
                    
                    <div class="qty-selector">
                        <span class="qty-btn" onclick="changeQty(-1)">[-]</span>
                        <span id="qty-display">1</span>
                        <span class="qty-btn" onclick="changeQty(1)">[+]</span>
                    </div>

                    <button class="add-to-cart-btn" onclick="addToCart()">ADD TO CART</button>
                    
                    <div class="details-nav">
                        <span onclick="prevProduct()">&lt; PREVIOUS</span>
                        <span onclick="nextProduct()">NEXT &gt;</span>
                    </div>
                </div>
            `;
        }

        function changeQty(delta) {
            selectedQty += delta;
            if(selectedQty < 1) selectedQty = 1;
            document.getElementById('qty-display').innerText = selectedQty;
        }

        function prevProduct() {
            currentProductIdx = (currentProductIdx - 1 + productsData.length) % productsData.length;
            renderDetails();
        }

        function nextProduct() {
            currentProductIdx = (currentProductIdx + 1) % productsData.length;
            renderDetails();
        }

        // Cart System
        function addToCart() {
            const prod = productsData[currentProductIdx];
            cart.push({ ...prod, qty: selectedQty });
            localStorage.setItem('void_cart', JSON.stringify(cart));
            updateCartUI();
            
            const btn = document.querySelector('.add-to-cart-btn');
            const originalText = btn.innerText;
            btn.innerText = "ADDED TO CART";
            btn.style.boxShadow = "0 0 30px #fff";
            setTimeout(() => {
                btn.innerText = originalText;
                btn.style.boxShadow = "";
            }, 1500);
        }

        function updateCartUI() {
            const count = cart.reduce((acc, item) => acc + item.qty, 0);
            document.getElementById('cart-count').innerText = count;
            document.getElementById('details-cart-count').innerText = count;
        }

        // Digital Clock
        function initClock() {
            const clockEl = document.getElementById('clock');
            setInterval(() => {
                const now = new Date();
                clockEl.innerText = now.toLocaleTimeString('en-US', { hour12: false });
            }, 1000);
        }

        // Starfield Animation
        function initStarfield() {
            const canvas = document.getElementById('starfield');
            const ctx = canvas.getContext('2d');
            let width, height;
            let stars = [];

            function resize() {
                width = canvas.width = window.innerWidth;
                height = canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resize);
            resize();

            for(let i=0; i<200; i++) {
                stars.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    size: Math.random() * 1.5,
                    speed: Math.random() * 0.5 + 0.1
                });
            }

            function animate() {
                ctx.clearRect(0, 0, width, height);
                ctx.fillStyle = '#ffffff';
                stars.forEach(star => {
                    ctx.globalAlpha = Math.random() * 0.5 + 0.5;
                    ctx.beginPath();
                    ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                    ctx.fill();
                    star.y -= star.speed;
                    if(star.y < 0) {
                        star.y = height;
                        star.x = Math.random() * width;
                    }
                });
                requestAnimationFrame(animate);
            }
            animate();
        }
    </script>
</body>
</html>
