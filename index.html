<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>X STORE ULTRA</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
:root{
--bg:#000;
--text:#fff;
--glow:rgba(255,255,255,0.7);
}

*{margin:0;padding:0;box-sizing:border-box;font-family:'Orbitron',sans-serif;}

body{
background:#000;
color:#fff;
overflow-x:hidden;
}

/* ===== LOADING ===== */
#loader{
position:fixed;
width:100%;
height:100%;
background:#000;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
font-size:30px;
animation:fadeOut 2s forwards 2s;
}
@keyframes fadeOut{to{opacity:0;visibility:hidden;}}

/* ===== STARS ===== */
.stars{
position:fixed;
width:100%;
height:100%;
background:url('https://www.transparenttextures.com/patterns/stardust.png');
animation:move 120s linear infinite;
z-index:-1;
}
@keyframes move{
from{background-position:0 0;}
to{background-position:10000px 10000px;}
}

/* ===== SECTIONS ===== */
section{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
transition:0.6s;
}

.hidden{opacity:0;pointer-events:none;position:absolute;}

/* ===== HOME ===== */
.logo{font-size:35px;margin-bottom:10px;letter-spacing:3px;}
.clock{opacity:0.7;margin-bottom:40px;}

.menu a{
display:block;
margin:15px;
font-size:22px;
cursor:pointer;
transition:0.3s;
}
.menu a:hover{
text-shadow:0 0 15px var(--glow);
transform:scale(1.1);
}

/* ===== SHOP ===== */
#shop{
padding:20px;
background-size:cover;
background-position:center;
}

.topbar{
width:100%;
display:flex;
justify-content:space-between;
margin-bottom:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
width:100%;
}

.card{
background:rgba(0,0,0,0.6);
border:1px solid rgba(255,255,255,0.2);
padding:10px;
text-align:center;
transition:0.3s;
backdrop-filter:blur(5px);
}

.card:hover{
transform:translateY(-5px) scale(1.05);
box-shadow:0 0 20px var(--glow);
}

.card img{
width:100%;
}

/* ===== PRODUCT ===== */
#product{
text-align:center;
background-size:cover;
padding:30px;
}

.product-img{
width:70%;
animation:float 4s ease-in-out infinite;
}
@keyframes float{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-10px);}
}

.btn{
margin-top:20px;
padding:15px;
border:1px solid white;
background:none;
color:white;
width:80%;
cursor:pointer;
transition:0.3s;
}

.btn:hover{
box-shadow:0 0 20px white;
transform:scale(1.05);
}

/* ===== CART ===== */
.cart-count{
position:absolute;
top:10px;
right:10px;
background:red;
padding:5px 10px;
border-radius:50%;
font-size:12px;
}

/* ===== PARALLAX ===== */
body:hover{
transition:transform 0.2s;
}

/* ===== RESPONSIVE ===== */
@media(max-width:600px){
.grid{grid-template-columns:1fr 1fr;}
}
</style>
</head>

<body>

<div id="loader">X STORE</div>
<div class="stars"></div>

<!-- ===== HOME ===== -->
<section id="home">
<div class="logo">X STORE</div>
<div id="clock" class="clock"></div>

<div class="menu">
<a onclick="go('home')">HOME</a>
<a onclick="go('shop')">SHOP</a>
<a>CONTACT</a>
</div>
</section>

<!-- ===== SHOP ===== -->
<section id="shop" class="hidden">
<div class="topbar">
<div>☰</div>
<div>X</div>
<div>🛒 <span id="cartCount">0</span></div>
</div>

<div class="grid" id="products"></div>
</section>

<!-- ===== PRODUCT ===== -->
<section id="product" class="hidden">
<img id="pimg" class="product-img">
<h2 id="pname"></h2>
<p id="pprice"></p>

<button class="btn" onclick="addToCart()">ADD TO CART</button>
<button class="btn" onclick="go('shop')">BACK</button>
</section>

<script>

/* ===== BACKGROUND ===== */
const productsBackground = "https://images.unsplash.com/photo-1512436991641-6745cdb1723f";

/* ===== PRODUCTS ===== */
const items=[
{name:"JACKET",price:"1200 EGP",img:"https://i.imgur.com/8Km9tLL.jpg"},
{name:"HOODIE",price:"700 EGP",img:"https://i.imgur.com/jTqXG6E.jpg"},
{name:"TRACKSUIT",price:"1500 EGP",img:"https://i.imgur.com/5tj6S7Ol.jpg"},
{name:"JEANS",price:"900 EGP",img:"https://i.imgur.com/OdL0XPt.jpg"}
];

/* ===== NAV ===== */
function go(page){
document.querySelectorAll("section").forEach(s=>s.classList.add("hidden"));
document.getElementById(page).classList.remove("hidden");

if(page==="shop"||page==="product"){
document.getElementById(page).style.backgroundImage=`url(${productsBackground})`;
}
}

/* ===== LOAD PRODUCTS ===== */
let container=document.getElementById("products");
items.forEach((item,i)=>{
container.innerHTML+=`
<div class="card" onclick="openProduct(${i})">
<img src="${item.img}">
<h3>${item.name}</h3>
<p>${item.price}</p>
</div>`;
});

/* ===== OPEN PRODUCT ===== */
let currentProduct=0;
function openProduct(i){
currentProduct=i;
go("product");
pimg.src=items[i].img;
pname.innerText=items[i].name;
pprice.innerText=items[i].price;
}

/* ===== CART ===== */
let cart=JSON.parse(localStorage.getItem("cart"))||[];

function addToCart(){
cart.push(items[currentProduct]);
localStorage.setItem("cart",JSON.stringify(cart));
updateCart();
}

function updateCart(){
document.getElementById("cartCount").innerText=cart.length;
}
updateCart();

/* ===== CLOCK ===== */
setInterval(()=>{
clock.innerText=new Date().toLocaleString();
},1000);

/* ===== PARALLAX EFFECT ===== */
document.addEventListener("mousemove",(e)=>{
let x=(e.clientX/window.innerWidth-0.5)*10;
let y=(e.clientY/window.innerHeight-0.5)*10;
document.body.style.transform=`translate(${x}px,${y}px)`;
});

</script>

</body>
</html>
